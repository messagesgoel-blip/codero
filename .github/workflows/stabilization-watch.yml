name: v1.2.1 Stabilization Watch

# 48-hour operational watch for v1.2.1 post-promotion.
# Runs release-status on both v1.2.1 (new) and v1.2.0 (baseline) every 6 hours,
# runs stabilization-triage for self-classifying regression detection, and
# fails only on NEW_FAILs.  Regressions trigger an automated GitHub Issue.
#
# Triage categories (stabilization-triage.sh):
#   NEW_FAIL    — check is FAIL in v1.2.1 but PASS/SKIP in v1.2.0 → workflow fails + issue opened
#   NEW_SKIP    — check is SKIP in v1.2.1, was PASS in v1.2.0 → warning, workflow passes
#   RECOVERED   — check is PASS/SKIP in v1.2.1, was FAIL in v1.2.0 → improvement
#   UNCHANGED   — no status change
#
# Artifacts uploaded per run:
#   stabilization-v121.json   — v1.2.1 release-status JSON
#   stabilization-v120.json   — v1.2.0 baseline release-status JSON
#   triage.json               — machine-readable triage output
#   triage-human.txt          — human-readable triage summary
#   stabilization-diff.md     — detailed check-level comparison (compare-release-status.sh)
#   stabilization-diff.json   — machine-readable delta (compare-release-status.sh)

on:
  schedule:
    # Every 6 hours during the 48h stabilization window (2026-03-17 → 2026-03-19).
    # Disable or update after stabilization window closes.
    - cron: "0 */6 * * *"

  workflow_dispatch:
    inputs:
      new_version:
        description: "Version under watch (e.g. v1.2.1)"
        required: false
        default: "v1.2.1"
      baseline_version:
        description: "Comparison baseline version (e.g. v1.2.0)"
        required: false
        default: "v1.2.0"

permissions:
  actions:  read
  contents: read
  issues:   write

jobs:
  stabilization-watch:
    name: Stabilization Watch (${{ github.event.inputs.new_version || 'v1.2.1' }} vs ${{ github.event.inputs.baseline_version || 'v1.2.0' }})
    runs-on: ubuntu-latest

    env:
      NEW_VERSION:      ${{ github.event.inputs.new_version      || 'v1.2.1' }}
      BASELINE_VERSION: ${{ github.event.inputs.baseline_version || 'v1.2.0' }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24.2"
          cache: true

      - name: Build codero binary
        run: |
          go build -trimpath -o ./bin/codero ./cmd/codero
          echo "Built: $(./bin/codero version)"

      - name: Make scripts executable
        run: |
          chmod +x scripts/automation/release-status.sh
          chmod +x scripts/automation/compare-release-status.sh
          chmod +x scripts/automation/stabilization-triage.sh

      # ── Collect release-status reports ──────────────────────────────────────

      - name: Run release-status for new version (${{ env.NEW_VERSION }})
        run: |
          mkdir -p ci-artifacts
          CODERO_BIN=./bin/codero \
            bash scripts/automation/release-status.sh \
              --version "${NEW_VERSION}" \
              --repo-path . \
              --json \
              2>ci-artifacts/stabilization-v121-human.txt \
          | tee ci-artifacts/stabilization-v121.json
          echo "--- Human Summary (new) ---"
          cat ci-artifacts/stabilization-v121-human.txt

      - name: Run release-status for baseline (${{ env.BASELINE_VERSION }})
        run: |
          CODERO_BIN=./bin/codero \
            bash scripts/automation/release-status.sh \
              --version "${BASELINE_VERSION}" \
              --repo-path . \
              --json \
              2>ci-artifacts/stabilization-v120-human.txt \
          | tee ci-artifacts/stabilization-v120.json || true
          echo "--- Human Summary (baseline) ---"
          cat ci-artifacts/stabilization-v120-human.txt

      - name: Download previous stabilization report (best effort)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_RUN_ID="$(gh run list \
            --workflow "${GITHUB_WORKFLOW}" \
            --branch "${GITHUB_REF_NAME}" \
            --limit 20 \
            --json databaseId,status,conclusion \
            | jq -r --arg cur "${GITHUB_RUN_ID}" '
                .[]
                | select(.status == "completed" and .conclusion == "success" and (.databaseId | tostring) != $cur)
                | .databaseId
              ' \
            | head -n 1)"

          if [ -z "${PREV_RUN_ID}" ]; then
            echo "No previous successful stabilization-watch run found."
            exit 0
          fi

          mkdir -p ci-artifacts/previous
          if ! gh run download "${PREV_RUN_ID}" --dir ci-artifacts/previous; then
            echo "Unable to download artifacts from run ${PREV_RUN_ID}; continuing without --previous."
            exit 0
          fi

          PREV_STATUS_PATH="$(find ci-artifacts/previous -type f -name stabilization-v121.json | head -n 1 || true)"
          if [ -n "${PREV_STATUS_PATH}" ]; then
            cp "${PREV_STATUS_PATH}" ci-artifacts/previous-v121.json
            echo "Loaded previous v1.2.1 report: ${PREV_STATUS_PATH}"
          else
            echo "Previous run ${PREV_RUN_ID} had no stabilization-v121.json artifact; continuing without --previous."
          fi

      # ── Triage (COD-045) ────────────────────────────────────────────────────
      # Classifies checks as NEW_FAIL / NEW_SKIP / RECOVERED / UNCHANGED.
      # Human report → stderr (triage-human.txt); machine JSON → stdout (triage.json).
      # || true: let the Assert step own the exit code so artifacts are always uploaded.

      - name: Run stabilization triage
        run: |
          PREVIOUS_ARGS=()
          if [ -f ci-artifacts/previous-v121.json ]; then
            PREVIOUS_ARGS=(--previous ci-artifacts/previous-v121.json)
          fi

          bash scripts/automation/stabilization-triage.sh \
            --current  ci-artifacts/stabilization-v121.json \
            --baseline ci-artifacts/stabilization-v120.json \
            "${PREVIOUS_ARGS[@]}" \
            --output   both \
            2>ci-artifacts/triage-human.txt \
          | tee ci-artifacts/triage.json || true
          echo "--- Triage Summary ---"
          cat ci-artifacts/triage-human.txt

      # ── Detailed diff (supplementary) ───────────────────────────────────────

      - name: Compare new vs baseline (detailed diff)
        run: |
          bash scripts/automation/compare-release-status.sh \
            --new      ci-artifacts/stabilization-v121.json \
            --baseline ci-artifacts/stabilization-v120.json \
            --output   both \
          > ci-artifacts/stabilization-diff.md 2>ci-artifacts/compare-human.txt || true

          bash scripts/automation/compare-release-status.sh \
            --new      ci-artifacts/stabilization-v121.json \
            --baseline ci-artifacts/stabilization-v120.json \
            --output   json \
          > ci-artifacts/stabilization-diff.json 2>/dev/null || true

      # ── Regression assertion ─────────────────────────────────────────────────

      - name: Assert regression-free
        run: |
          if [ ! -f ci-artifacts/triage.json ]; then
            echo "::error::triage.json not produced — triage step failed"
            exit 1
          fi

          regression_free="$(jq -r '.regression_free' ci-artifacts/triage.json)"
          new_fail_count="$( jq -r '.totals.new_fail' ci-artifacts/triage.json)"
          new_skip_count="$( jq -r '.totals.new_skip' ci-artifacts/triage.json)"
          recovered="$(      jq -r '.totals.recovered' ci-artifacts/triage.json)"
          unchanged="$(      jq -r '.unchanged_count'  ci-artifacts/triage.json)"

          if [ "${new_skip_count}" -gt 0 ]; then
            new_skips="$(jq -r '.new_skips | join(", ")' ci-artifacts/triage.json)"
            echo "::warning::NEW_SKIP detected (env drift, not a failure): ${new_skips}"
          fi

          if [ "${regression_free}" != "true" ]; then
            new_fails="$(jq -r '.new_fails | join(", ")' ci-artifacts/triage.json)"
            echo "::error::Regression detected in ${NEW_VERSION}: ${new_fail_count} NEW_FAIL(s): ${new_fails}"
            exit 1
          fi

          echo "regression_free=true  new_fail=${new_fail_count}  new_skip=${new_skip_count}  recovered=${recovered}  unchanged=${unchanged}"

      # ── Escalation (COD-046) ─────────────────────────────────────────────────
      # Runs only when a previous step failed (i.e. regressions were detected).
      # Creates a new GitHub Issue or adds a comment to an existing open regression issue.

      - name: Escalate regression to GitHub Issue
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f ci-artifacts/triage.json ]; then
            echo "triage.json missing — skipping issue escalation"
            exit 0
          fi

          regression_free="$(jq -r '.regression_free' ci-artifacts/triage.json)"
          if [ "${regression_free}" = "true" ]; then
            echo "No regression — skipping issue escalation"
            exit 0
          fi

          new_fails="$(      jq -r '.new_fails | join(", ")'  ci-artifacts/triage.json)"
          cur_ver="$(        jq -r '.current_version'          ci-artifacts/triage.json)"
          new_fail_count="$( jq -r '.totals.new_fail'          ci-artifacts/triage.json)"
          triage_at="$(      jq -r '.triage_at'                ci-artifacts/triage.json)"

          RUNBOOK_URL="https://github.com/${GITHUB_REPOSITORY}/blob/main/docs/runbooks/v1.2.1-stabilization-watch.md"
          RUN_URL="https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"

          FAILING_TABLE="$(jq -r '
            .changes[]
            | select(.category == "NEW_FAIL")
            | "| \(.id) | \(.group) | \(.name) | \(.baseline_status) | \(.current_status) | \(if .persistent then "yes" else "no" end) |"
          ' ci-artifacts/triage.json)"

          ISSUE_BODY="$(cat <<EOF
## ${cur_ver} Stabilization Regression Detected

**First seen:** ${triage_at}
**Run:** [${GITHUB_RUN_ID}](${RUN_URL})
**Trigger:** \`${GITHUB_EVENT_NAME}\`
**NEW_FAILs:** ${new_fail_count} (${new_fails})

### Failing Checks

| ID | Group | Name | Baseline | Current | Persistent |
|---|---|---|---|---|---|
${FAILING_TABLE}

### Next steps

1. Review the [workflow run](${RUN_URL}) artifacts (\`triage.json\`, \`triage-human.txt\`).
2. Consult the [stabilization runbook](${RUNBOOK_URL}) for backout criteria.
3. If two consecutive runs show the same NEW_FAIL — execute rollback.

> Auto-opened by stabilization-watch run \`${GITHUB_RUN_ID}\`.
EOF
)"

          ISSUE_TITLE="${cur_ver} Stabilization Regression"

          # Find existing open regression issue for this version
          EXISTING="$(gh issue list \
            --repo "${GITHUB_REPOSITORY}" \
            --state open \
            --search "${ISSUE_TITLE}" \
            --json number \
            --jq '.[0].number // empty')"

          if [ -n "${EXISTING}" ]; then
            echo "Adding comment to existing issue #${EXISTING}"
            gh issue comment "${EXISTING}" \
              --repo "${GITHUB_REPOSITORY}" \
              --body "${ISSUE_BODY}"
          else
            echo "Creating new regression issue"
            gh issue create \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${ISSUE_TITLE}" \
              --body "${ISSUE_BODY}"
          fi

      # ── Job summary (COD-046) ───────────────────────────────────────────────

      - name: Write job summary
        if: always()
        run: |
          {
            echo "# v1.2.1 Stabilization Watch"
            echo ""
            echo "**Run:** \`${GITHUB_RUN_ID}\`  **Trigger:** \`${{ github.event_name }}\`  **Version:** \`${NEW_VERSION}\`"
            echo ""

            if [ -f ci-artifacts/triage.json ]; then
              rf="$(        jq -r '.regression_free'  ci-artifacts/triage.json)"
              new_fail="$(  jq -r '.totals.new_fail'  ci-artifacts/triage.json)"
              new_skip="$(  jq -r '.totals.new_skip'  ci-artifacts/triage.json)"
              recovered="$( jq -r '.totals.recovered' ci-artifacts/triage.json)"
              unchanged="$( jq -r '.unchanged_count'  ci-artifacts/triage.json)"

              if [ "${rf}" = "true" ]; then
                echo "## Triage Result: REGRESSION-FREE"
              else
                echo "## Triage Result: REGRESSION DETECTED"
              fi
              echo ""
              echo "| Category  | Count |"
              echo "|---|---:|"
              echo "| NEW_FAIL  | ${new_fail} |"
              echo "| NEW_SKIP  | ${new_skip} |"
              echo "| RECOVERED | ${recovered} |"
              echo "| UNCHANGED | ${unchanged} |"
              echo ""

              if [ "${new_fail}" -gt 0 ]; then
                echo "### Failing Checks"
                echo ""
                echo "| ID | Group | Name | Persistent |"
                echo "|---|---|---|---|"
                jq -r '.changes[] | select(.category == "NEW_FAIL") | "| \(.id) | \(.group) | \(.name) | \(if .persistent then "yes" else "no" end) |"' \
                  ci-artifacts/triage.json
                echo ""
                echo "> See runbook: \`docs/runbooks/v1.2.1-stabilization-watch.md\`"
              fi

              if [ "${new_skip}" -gt 0 ]; then
                echo ""
                echo "### New Skips (warnings)"
                echo ""
                jq -r '.changes[] | select(.category == "NEW_SKIP") | "- \(.id) (\(.group)/\(.name))"' \
                  ci-artifacts/triage.json
              fi
            else
              echo "Triage output not available — triage step may have failed."
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      # ── Artifact upload ─────────────────────────────────────────────────────

      - name: Upload stabilization artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stabilization-watch-${{ github.run_id }}
          path: |
            ci-artifacts/stabilization-v121.json
            ci-artifacts/stabilization-v121-human.txt
            ci-artifacts/stabilization-v120.json
            ci-artifacts/stabilization-v120-human.txt
            ci-artifacts/triage.json
            ci-artifacts/triage-human.txt
            ci-artifacts/stabilization-diff.md
            ci-artifacts/stabilization-diff.json
          retention-days: 7
