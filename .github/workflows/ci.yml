name: ci

on:
  push:
    branches: ["**"]
  pull_request:

# CodeRabbit runs as a GitHub Marketplace App (not as a CI workflow job).
# Required Status Checks (configure in GitHub branch protection settings):
# - lint
# - unit
# - contract
# - CodeRabbit Review (added automatically once the app is installed)
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - run: make lint

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - name: Run unit tests with coverage
        run: go test ./cmd/... ./internal/... -coverprofile=coverage.out -covermode=atomic
      - name: Show coverage summary
        run: go tool cover -func=coverage.out
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.out

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"
      - run: make contract
