<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codero dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="shell">
  <aside class="sidebar">
    <div class="sidebar-logo"><span>codero</span></div>
    <nav class="sidebar-nav">
      <button class="nav-item active" id="nav-overview" aria-label="Overview" onclick="navigateTo('overview')">
        <span class="nav-icon" aria-hidden="true">&#x25A3;</span><span>Overview</span>
      </button>
      <button class="nav-item" id="nav-agents" aria-label="Agents" onclick="navigateTo('agents')">
        <span class="nav-icon" aria-hidden="true">&#x2699;</span><span>Agents</span>
        <span class="nav-badge" id="badge-agents">&mdash;</span>
      </button>
      <button class="nav-item" id="nav-events" aria-label="Events" onclick="navigateTo('events')">
        <span class="nav-icon" aria-hidden="true">&#x25C9;</span><span>Events</span>
      </button>
      <button class="nav-item" id="nav-findings" aria-label="Findings" onclick="navigateTo('findings')">
        <span class="nav-icon" aria-hidden="true">&#x26A0;</span><span>Findings</span>
      </button>
      <button class="nav-item" id="nav-architecture" aria-label="Architecture" onclick="navigateTo('architecture')">
        <span class="nav-icon" aria-hidden="true">&#x2302;</span><span>Architecture</span>
      </button>
      <button class="nav-item" id="nav-settings" aria-label="Settings" onclick="navigateTo('settings')">
        <span class="nav-icon" aria-hidden="true">&#x2630;</span><span>Settings</span>
      </button>
    </nav>
  </aside>
  <div class="main-area">
    <div class="main-content">
      <div class="page active" id="page-overview"></div>
      <div class="page" id="page-agents"></div>
      <div class="page" id="page-events"></div>
      <div class="page" id="page-findings"></div>
      <div class="page" id="page-architecture"></div>
      <div class="page" id="page-settings"></div>
    </div>
    <div class="health-bar" id="health-bar">
      <span class="health-dot" id="hb-db-dot"></span>
      <span id="hb-db-label">db</span>
      <span class="health-dot" id="hb-sessions-dot"></span>
      <span id="hb-sessions-label">sessions</span>
      <span class="health-dot" id="hb-gates-dot"></span>
      <span id="hb-gates-label">gates</span>
      <span id="hb-agents-label"></span>
      <span id="hb-refreshed"></span>
      <div class="theme-toggle">
        <button data-theme="system" onclick="setTheme('system')">sys</button>
        <button data-theme="dark" onclick="setTheme('dark')">dark</button>
        <button data-theme="light" onclick="setTheme('light')">light</button>
      </div>
    </div>
  </div>
</div>
<script src="./app.js"></script>
</body>
</html>
