<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>codero · numera</title>
<link rel="stylesheet" href="./styles.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <img src="./numera-logo.svg" alt="Numera" class="sidebar-logo-icon">
        <div class="sidebar-logo-text">
          <span class="sidebar-brand-name">numera</span>
          <span class="sidebar-brand-code">code</span>
        </div>
      </div>
    </div>
    <nav class="sidebar-nav">
      <a class="nav-item active" data-tab="overview" href="#overview">
        <span class="nav-icon">&#9673;</span><span class="nav-label">Overview</span>
      </a>
      <a class="nav-item" data-tab="sessions" href="#sessions">
        <span class="nav-icon">&#9881;</span><span class="nav-label">Sessions</span>
      </a>
      <a class="nav-item" data-tab="pipeline" href="#pipeline">
        <span class="nav-icon">&#9654;</span><span class="nav-label">Pipeline</span>
      </a>
      <a class="nav-item" data-tab="tasks" href="#tasks">
        <span class="nav-icon">&#9776;</span><span class="nav-label">Tasks</span>
      </a>
      <a class="nav-item" data-tab="gate" href="#gate">
        <span class="nav-icon">&#9888;</span><span class="nav-label">Gate</span>
      </a>
      <a class="nav-item" data-tab="chat" href="#chat">
        <span class="nav-icon">&#9993;</span><span class="nav-label">Chat</span>
      </a>
      <a class="nav-item" data-tab="archives" href="#archives">
        <span class="nav-icon">&#9201;</span><span class="nav-label">Archives</span>
      </a>
      <a class="nav-item" data-tab="settings" href="#settings">
        <span class="nav-icon">&#9881;</span><span class="nav-label">Settings</span>
      </a>
    </nav>
  </aside>

  <!-- Main -->
  <div class="main">
    <header class="header">
      <div class="header-title" id="header-title">Overview</div>
      <div class="header-actions">
        <button class="header-btn" id="btn-cmd-palette" title="Search (Cmd+K)">&#8984;K</button>
        <button class="header-btn" id="btn-chat-toggle" title="Chat assistant">&#9993;</button>
        <button class="header-btn" id="btn-theme" title="Toggle theme">&#9789;</button>
      </div>
    </header>

    <div class="content">
      <div class="page active" id="page-overview"></div>
      <div class="page" id="page-sessions"></div>
      <div class="page" id="page-pipeline"></div>
      <div class="page" id="page-tasks"></div>
      <div class="page" id="page-gate"></div>
      <div class="page" id="page-chat"></div>
      <div class="page" id="page-archives"></div>
      <div class="page" id="page-settings"></div>
    </div>

    <div class="health-bar" id="health-bar">
      <span><span class="health-dot unknown" id="hb-db-dot"></span> DB</span>
      <span><span class="health-dot unknown" id="hb-redis-dot"></span> Redis</span>
      <span><span class="health-dot unknown" id="hb-gh-dot"></span> GitHub</span>
      <span id="hb-agents">0 agents</span>
      <span id="hb-time" style="margin-left:auto"></span>
      <span id="hb-sse-status"></span>
    </div>
  </div>
</div>

<!-- Floating chat button (visible on all pages except chat) -->
<button class="chat-floating-btn" id="chat-floating-btn" style="display:none" title="Open chat">&#9993;</button>
<div class="chat-floating-panel glass-card" id="chat-floating-panel" style="display:none"></div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
