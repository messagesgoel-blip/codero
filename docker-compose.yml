services:
  codero:
    build:
      context: .
      args:
        VERSION: ${CODERO_VERSION:-v1.0.0}
    image: codero:${CODERO_VERSION:-v1.0.0}
    container_name: codero
    restart: unless-stopped
    env_file: .env
    environment:
      # Container-network Redis address overrides the .env value.
      CODERO_REDIS_ADDR: redis:6379
      CODERO_DB_PATH: /data/db/codero.db
      CODERO_PID_FILE: /data/pids/codero.pid
      CODERO_LOG_PATH: /data/logs/codero.log
      CODERO_OBSERVABILITY_PORT: "8080"
    ports:
      - "127.0.0.1:8110:8080"
    volumes:
      - codero-db:/data/db
      - codero-logs:/data/logs
      - codero-pids:/data/pids
      - codero-tmp:/data/tmp
      - codero-snapshots:/data/snapshots
    networks:
      default:
      proxy:
        ipv4_address: 172.25.0.31
    depends_on:
      redis:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: codero-redis-prod
    restart: unless-stopped
    environment:
      CODERO_REDIS_PASS: ${CODERO_REDIS_PASS:-}
    command: >
      redis-server
      --appendonly yes
      --requirepass ${CODERO_REDIS_PASS:-}
      --loglevel notice
    volumes:
      - redis-data:/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "if [ -n \"$${CODERO_REDIS_PASS}\" ]; then redis-cli -a \"$${CODERO_REDIS_PASS}\" ping | grep -q PONG; else redis-cli ping | grep -q PONG; fi",
        ]
      interval: 5s
      timeout: 3s
      retries: 5

# Shared reverse-proxy network (pre-created: docker network create --subnet=172.25.0.0/16 proxy)
networks:
  proxy:
    external: true

volumes:
  codero-db:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/db
  codero-logs:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/logs
  codero-pids:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/pids
  codero-tmp:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/tmp
  codero-snapshots:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/snapshots
  redis-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /srv/docker/apps/codero/redis
